{% extends "base.html" %}

{% block content %}

<h2>

ATS Analytics

</h2>

<canvas id="chart">

</canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

new Chart(

document.getElementById(
"chart"
),

{
type:'line',

data:{
labels:[
{% for score in scores %}
'{{ loop.index }}',
{% endfor %}
],

datasets:[{

label:'ATS',

data:[
{{ scores|join(',') }}
]

}]
}
}

);

</script>

{% endblock %}
