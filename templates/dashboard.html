{% extends "base.html" %}

{% block content %}

<div class="row">

<div class="col-md-4">

<div class="dashboard-card">

<h4>

Total Resumes

</h4>

<div class="metric">

{{ resumes|length }}

</div>

</div>

</div>

<div class="col-md-4">

<div class="dashboard-card">

<h4>

Interviews

</h4>

<div class="metric">

{{ interviews|length }}

</div>

</div>

</div>

<div class="col-md-4">

<div class="dashboard-card">

<h4>

Profile

</h4>

<div class="metric">

{{ current_user.name }}

</div>

</div>

</div>

</div>

<hr>

<div class="glass mt-4">

<h3>

Resume History

</h3>

<table class="table table-dark">

<tr>

<th>
Resume
</th>

<th>
ATS
</th>

</tr>

{% for resume in resumes %}

<tr>

<td>
{{ resume.filename }}
</td>

<td>
{{ resume.ats_score }}
</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
