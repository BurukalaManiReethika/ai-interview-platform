
<html>

<head>
    <title>Analysis Report</title>
</head>

<body>

<h1>Resume Analysis Report</h1>

<h2>ATS Score</h2>

<p>{{ ats_score }}/100</p>

<h2>Skills Found</h2>

<ul>
{% for skill in skills %}
<li>{{ skill }}</li>
{% endfor %}
</ul>

<h2>Missing Skills</h2>

<ul>
{% for skill in missing %}
<li>{{ skill }}</li>
{% endfor %}
</ul>

<h2>Interview Questions</h2>

<pre>
{{ questions }}
</pre>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="atsChart">
</canvas>

<script>

drawATS(
{{ ats_score }}
);

</script>

<script
src="{{ url_for(
'static',
filename='js/charts.js'
) }}">
</script>
<h1 id="score">

0

</h1>

<script>

let score =
{{ ats_score }};

let count = 0;

let interval =
setInterval(()=>{

count++;

document
.getElementById(
"score"
).innerHTML =
count;

if(count >= score){

clearInterval(
interval
);

}

},20);

</script>
</body>
</html>
